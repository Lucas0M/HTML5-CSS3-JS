<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Burger Paranavai</title>
  <link rel="stylesheet" href="style/style.css">
</head>
<body>
  <header>
    <h1>A Melhor Hamburgueria de Paranavaí Chegou!</h1>
    <p>Cadastre-se abaixo para receber 50% de desconto no dia da nossa inauguração.</p>
  </header>
  <main>
    <section id="form">
      <form action="" autocomplete="on" method="post">
        <p>
          <label for="inome">Nome</label>
          <input type="text" name="nome" id="inome" autocomplete="name">
        </p>
        <p>
          <label for="iemail">E-mail</label>
          <input type="email" name="email" id="iemail">
        </p>
        <p>
          <label for="itel">Whatsapp</label>
          <input type="tel" name="tel" id="itel" placeholder="(xx)xxxxx-xxxx">
        </p>
        <p>
          <input type="submit" value="Enviar">
          <input type="reset" value="Apagar">
        </p>
      </form>
    </section>
    <section id="map">
      <h2>Onde estamos</h2>
      <iframe src="https://www.google.com/maps/embed?pb=!1m16!1m12!1m3!1d3086.560364160046!2d-52.46106199675036!3d-23.076604065262533!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!2m1!1sR.%20Souza%20Naves%2C%201075%20-%20Vila%20Brasil%2C%20Paranava%C3%AD%20-%20PR%2C%2087702-220%2C%20Brazil!5e0!3m2!1sen!2sbr!4v1772812981832!5m2!1sen!2sbr" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade">
        <p>Seu navegador nao tem suporte pra isso</p>
      </iframe>
    </section>
  </main>
  <footer>
    <p>Site feito totalmente por MIM</p>
  </footer>
</body>
</html>
