<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form</title>
</head>
<body>
  <h1>Exemplo de form</h1>
  <form action="cadastr2o.php" method="GET" autocomplete="on">
    <fieldset>
      <legend>Sexo</legend>
      <input type="radio" name="sexo" id="isxmas"><label for="isxmas">Masculino</label>
      <input type="radio" name="sexo" id="isxfem"><label for="isxfem">Feminino</label>
    </fieldset>
    <fieldset>
      <legend>Esportes Favoritos</legend>
      <input type="checkbox" name="esfut" id="iesfut" checked><label for="iesfut">Futebol</label> <br>
      <input type="checkbox" name="esfut" id="iesbas"><label for="iesbas">Basquete</label> <br>
      <input type="checkbox" name="esfut" id="iesnat"><label for="iesnat">Natacao</label> <br>
      <input type="checkbox" name="esfut" id="iesten"><label for="iesten">Tenis</label>
    </fieldset>

    <p>
      <input type="submit" value="Enviar">
      <input type="reset" value="Limpar">
    </p>
</form>
</body>
</html>
