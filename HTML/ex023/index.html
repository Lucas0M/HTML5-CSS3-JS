<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabelas</title>
  <style>
    body{
      font-family: Arial, Helvetica, sans-serif;
    }

    table {
      width: 400px;
      height: 400px;
      border-collapse: collapse;
    }

    td {
      padding: 8px;
      border: 1px solid black;
      text-align: center;
      vertical-align: middle;
    }

    .numero{
      text-align: right;
    }
  </style>
</head>
<body>
  <h1>first table</h1>
  <!--
    TABLE
      TABLE ROW
        TABLE HEADER
        TABLE DATA
  -->
  <table>
    <tr>
      <td>A1</td>
      <td>B1</td>
      <td class="numero">300</td>
    </tr>
    <tr>
      <td>A2</td>
      <td>B2</td>
      <td>C2</td>
    </tr>
    <tr>
      <td>A3</td>
      <td>B3</td>
      <td>C3</td>
    </tr>
    <tr>
      <td>A4</td>
      <td>B4</td>
      <td>C4</td>
    </tr>
  </table> 
</body>
</html>
