<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Salvando dados</title>
</head>
<body>
  <header>
    <h1>Salvando dados</h1>
  </header>
  <section>
    <div class="container">
      <div class="number">
        <p>Adicione um numero entre 1 e 100: <input type="number" name="num" id="txtn">
        <input type="button" value="Adicionar" onclick="AddNumber()"></p>
      </div>
      <select name="tabela" id="seltab" size="10">
      </select>
      <input type="button" value="Finalizar" onclick="ShowRes()">
      <div id="res"></div>
    </div>
  </section>
  <footer>
    <p>&copy; Lucas Macarini</p>
  </footer>
  <script src="script.js"></script>
</body>
</html>
