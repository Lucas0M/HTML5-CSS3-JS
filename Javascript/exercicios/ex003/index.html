<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Contador de sequencia</title>
</head>
<body>
  <header>
    <h1>Contador de Numero</h1>
  </header>
  <section>
    <div class="container">
      <p>Inicio:
        <input type="number" name="numinicio" id="numinicio" min="1">
      </p>
      <p>Fim:
        <input type="number" name="numfim" id="numfim" min="1">
      </p>
      <p>Passo:
        <input type="number" name="numpasso" id="numpasso" min="1">
      </p>
      <p>
        <input type="button" value="Contar" id="btncontar" onclick="contar()">
      </p>

      <div id="res">
        <p>Preparando a contagem...:

        </p>
      </div>
    </div>

  </section>
  <footer>
    <p>&copy; Lucas Macarini</p>
  </footer>
  <script src="script.js"></script>
</body>
</html>
