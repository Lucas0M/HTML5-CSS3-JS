<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flex Box</title>
  <style>
    .container {
      background-color: grey;

      display: flex;
      flex-flow: row nowrap;
    }

    .item {
      background-color: aqua;
      border: 1px solid black;
      text-align: center;
      flex-basis: 150px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="item">a</div>
    <div class="item">Conteudo grande</div>
    <div class="item">c</div>
    <div class="item">Conteudo maior que o conteudo grande</div>
    <div class="item">e</div>
    <div class="item">Conteudo muito maior que o conteudo maior que o conteudo grande</div>
    <div class="item">g</div>
  </div>
</body>
</html>
