<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flex Box</title>
  <style>
    .container {
      background-color: grey;

      display: flex;
      flex-flow: row nowrap;
    }

    .item {
      background-color: aqua;
      border: 1px solid black;
      text-align: center;
    }

    #i1 {
      /* flex-grow: 1;
      flex-shrink: 0;
      flex-basis: 200px; */

      flex: 1 0 200px;
    }

    #i2 {
      /* flex-grow: 1;
      flex-shrink: 1;
      flex-basis: 150px; */

      flex: 1 1 150px;
    }

    #i3 {
      /* flex-grow: 1;
      flex-shrink: 8;
      flex-basis: auto; */

      flex: 1 8 auto;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="item" id="i1">a</div>
    <div class="item" id="i2">b</div>
    <div class="item" id="i3">c</div>
  </div>
</body>
</html>
